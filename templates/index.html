<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Code Compliance Check System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script type="module" crossorigin src="/assets/main.js?v=0.8.6"></script>
  <link rel="stylesheet" crossorigin href="/assets/main.css?v=0.8.6">
    <style>
        .example-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .example-btn {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #000000;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            width: auto;
        }

        .example-btn:hover {
            background-color: #f0f0f0;
        }

        .example-ifc-row {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 14px;
            color: #6c757d;
        }

        .example-ifc-btn {
            background-color: #444444;
            color: #ffffff;
            border: 1px solid #444444;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            width: auto;
        }

        .example-ifc-btn:hover {
            background-color: #3a3a3a;
            border-color: #3a3a3a;
        }

        .example-ifc-btn:disabled {
            background-color: #888888;
            border-color: #888888;
            cursor: not-allowed;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        @media (max-width: 900px) {
            body {
                height: auto;
                overflow: auto;
                overflow-x: hidden;
            }

            .main-container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                width: 100%;
            }

            .left-panel,
            .right-panel {
                width: 100%;
            }

            .left-panel {
                height: 45vh;
                min-height: 260px;
            }

            .right-panel {
                padding: 12px;
                box-shadow: none;
                box-sizing: border-box;
            }

            .example-buttons {
                flex-wrap: nowrap;
                gap: 6px;
            }

            .example-btn {
                flex: 1 1 0;
                min-width: 0;
                font-size: 11px;
                padding: 6px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Left Panel: 3D Viewer -->
        <div class="left-panel">
            <canvas id="three-canvas"></canvas>
            <div id="viewer-overlay">
                <div class="preview-placeholder" id="preview-placeholder">
                    <i>📁</i>
                    <div>Upload IFC File</div>
                    <div class="example-ifc-row">
                        <span>or</span>
                        <button id="example-ifc-btn" class="example-ifc-btn" type="button">Use Example IFC Model</button>
                    </div>
                </div>
                <div id="file-info" style="display: none; text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 15px;">✓</div>
                    <div style="font-size: 18px; font-weight: 600; margin-bottom: 10px;" id="file-name-display"></div>
                    <div style="font-size: 14px; color: #666;" id="file-size-display"></div>
                    <div style="font-size: 12px; color: #999; margin-top: 15px;">Click or drag to change file</div>
                </div>
            </div>
            <button id="reupload-btn" class="reupload-btn" style="display: none;">
                Change File
            </button>
        </div>

        <!-- Right Panel: Form and Results -->
        <div class="right-panel">
            <form id="checkForm" enctype="multipart/form-data">
                <div class="form-group">
                    <textarea id="regulation" name="regulation" placeholder="Enter building code text..." required></textarea>
                    <div class="example-buttons">
                        <button type="button" id="example-regulation-btn-1" class="example-btn">Use Example Regulation 1</button>
                        <button type="button" id="example-regulation-btn-2" class="example-btn">Use Example Regulation 2</button>
                    </div>
                </div>

                <div class="api-key-section">
                    <label class="api-key-toggle">
                        <input
                            type="checkbox"
                            id="use-user-key"
                            onchange="const input=document.getElementById('api_key'); if (input) { if (this.checked) { input.readOnly=false; input.removeAttribute('readonly'); input.setAttribute('aria-disabled','false'); input.focus(); } else { input.value=''; input.readOnly=true; input.setAttribute('readonly','readonly'); input.setAttribute('aria-disabled','true'); } }"
                        >
                        Use my API key
                    </label>
                    <input type="password" id="api_key" name="api_key" class="api-key-input" placeholder="Paste a Gemini or OpenRouter API key" autocomplete="off" readonly aria-disabled="true">
                </div>

                <input type="file" id="ifc_file" name="ifc_file" accept=".ifc" required style="display: none;">

                <button type="submit" id="submitBtn">Start Check</button>
                <button type="button" id="stopBtn" class="stop-btn" style="display: none;">Cancel Check</button>
            </form>

            <div id="loading" class="loading" style="display: none;">
                <p>Checking compliance, please wait...</p>
            </div>

            <div id="result" class="result"></div>
        </div>
    </div>

    <script>
        (function () {
            const exampleRegulationText1 = 'Egress doors shall be of the pivoted or side-hinged swinging type.';
            const exampleRegulationText2 = 'Where elevators are provided in buildings four or more stories above, or four or more stories below, grade plane, not fewer than one elevator shall provided access to all floors.';
            const exampleBtn1 = document.getElementById('example-regulation-btn-1');
            const exampleBtn2 = document.getElementById('example-regulation-btn-2');
            const regulationInput = document.getElementById('regulation');
            const exampleIfcBtn = document.getElementById('example-ifc-btn');
            const ifcInput = document.getElementById('ifc_file');
            const reuploadBtn = document.getElementById('reupload-btn');
            const exampleIfcFileName = 'M02_no_space.ifc';
            const exampleIfcPath = `/examples/ifc/${exampleIfcFileName}`;
            if (!regulationInput) {
                return;
            }

            function applyExample(text) {
                regulationInput.value = text;
                regulationInput.focus();
                regulationInput.dispatchEvent(new Event('input', { bubbles: true }));
            }

            function hideExampleIfcButton() {
                if (exampleIfcBtn) {
                    exampleIfcBtn.style.display = 'none';
                }
            }

            function showExampleIfcButton() {
                if (exampleIfcBtn) {
                    exampleIfcBtn.style.display = 'block';
                }
            }

            function getExampleIfcUrls() {
                const urls = [exampleIfcPath];
                const fallbackOrigin = `${window.location.protocol}//${window.location.hostname}:8000`;
                if (window.location.origin !== fallbackOrigin) {
                    urls.push(`${fallbackOrigin}${exampleIfcPath}`);
                }
                return Array.from(new Set(urls));
            }

            async function fetchExampleIfcFile() {
                const urls = getExampleIfcUrls();
                let lastError = null;

                for (const url of urls) {
                    try {
                        const response = await fetch(url);
                        if (!response.ok) {
                            throw new Error(`Request failed (${response.status})`);
                        }
                        return await response.blob();
                    } catch (error) {
                        lastError = error;
                        console.warn('Example IFC fetch failed:', url, error);
                    }
                }

                throw lastError || new Error('Failed to load example IFC model.');
            }

            if (exampleBtn1) {
                exampleBtn1.addEventListener('click', () => applyExample(exampleRegulationText1));
            }

            if (exampleBtn2) {
                exampleBtn2.addEventListener('click', () => applyExample(exampleRegulationText2));
            }

            if (reuploadBtn && exampleIfcBtn) {
                if (reuploadBtn.style.display && reuploadBtn.style.display !== 'none') {
                    hideExampleIfcButton();
                } else {
                    const observer = new MutationObserver(() => {
                        if (reuploadBtn.style.display && reuploadBtn.style.display !== 'none') {
                            hideExampleIfcButton();
                            observer.disconnect();
                        }
                    });
                    observer.observe(reuploadBtn, { attributes: true, attributeFilter: ['style', 'class'] });
                }

                reuploadBtn.addEventListener('click', () => {
                    showExampleIfcButton();
                });
            }

            if (exampleIfcBtn && ifcInput) {
                exampleIfcBtn.addEventListener('click', async (event) => {
                    event.preventDefault();
                    event.stopPropagation();

                    const originalText = exampleIfcBtn.textContent;
                    exampleIfcBtn.disabled = true;
                    exampleIfcBtn.textContent = 'Loading example IFC...';

                    try {
                        const blob = await fetchExampleIfcFile();
                        const file = new File([blob], exampleIfcFileName, {
                            type: blob.type || 'application/octet-stream'
                        });
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(file);
                        ifcInput.files = dataTransfer.files;
                        ifcInput.dispatchEvent(new Event('change', { bubbles: true }));
                    } catch (error) {
                        console.error('Example IFC load error:', error);
                        alert('Failed to load example IFC model. Please make sure the backend is running.');
                    } finally {
                        exampleIfcBtn.disabled = false;
                        exampleIfcBtn.textContent = originalText;
                    }
                });
            }
        })();
    </script>

</body>
</html>
