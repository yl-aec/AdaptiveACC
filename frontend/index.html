<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Code Compliance Check System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="main-container">
        <!-- Left Panel: 3D Viewer -->
        <div class="left-panel">
            <canvas id="three-canvas"></canvas>
            <div id="viewer-overlay">
                <div class="preview-placeholder" id="preview-placeholder">
                    <i>📁</i>
                    <div>Upload IFC File</div>
                    <div class="example-ifc-row">
                        <span>or</span>
                        <button id="example-ifc-btn" class="example-ifc-btn" type="button">Use Example IFC Model</button>
                    </div>
                </div>
                <div id="file-info" style="display: none; text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 15px;">✓</div>
                    <div style="font-size: 18px; font-weight: 600; margin-bottom: 10px;" id="file-name-display"></div>
                    <div style="font-size: 14px; color: #666;" id="file-size-display"></div>
                    <div style="font-size: 12px; color: #999; margin-top: 15px;">Click or drag to change file</div>
                </div>
            </div>
            <button id="reupload-btn" class="reupload-btn" style="display: none;">
                Change File
            </button>
        </div>

        <!-- Right Panel: Form and Results -->
        <div class="right-panel">
            <form id="checkForm" enctype="multipart/form-data">
                <div class="form-group">
                    <textarea id="regulation" name="regulation" placeholder="Enter building code text..." required></textarea>
                    <div class="example-buttons">
                        <button type="button" id="example-regulation-btn-1" class="example-btn">Use Example Regulation 1</button>
                        <button type="button" id="example-regulation-btn-2" class="example-btn">Use Example Regulation 2</button>
                    </div>
                </div>

                <div class="api-key-section">
                    <label class="api-key-toggle">
                        <input
                            type="checkbox"
                            id="use-user-key"
                            onchange="const input=document.getElementById('api_key'); if (input) { if (this.checked) { input.readOnly=false; input.removeAttribute('readonly'); input.setAttribute('aria-disabled','false'); input.focus(); } else { input.value=''; input.readOnly=true; input.setAttribute('readonly','readonly'); input.setAttribute('aria-disabled','true'); } }"
                        >
                        Use my API key
                    </label>
                    <input type="password" id="api_key" name="api_key" class="api-key-input" placeholder="Paste a Gemini or OpenRouter API key" autocomplete="off" readonly aria-disabled="true">
                </div>

                <input type="file" id="ifc_file" name="ifc_file" accept=".ifc" required style="display: none;">
                <input type="hidden" id="use_example_ifc" name="use_example_ifc" value="">

                <button type="submit" id="submitBtn">Start Check</button>
                <button type="button" id="stopBtn" class="stop-btn" style="display: none;">Stop Check</button>
            </form>

            <div id="loading" class="loading" style="display: none;">
                <p>Checking compliance, please wait...</p>
            </div>

            <div id="result" class="result"></div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
